<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkVoice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .container {
      text-align: center;
      max-width: 400px;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }
    .status {
      color: #a1a1aa;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #27272a;
      border-top-color: #fafafa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      display: none;
      background: #1c1917;
      border: 1px solid #44403c;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      text-align: left;
    }
    .error p {
      color: #fca5a5;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .error-detail {
      color: #a8a29e;
      font-size: 0.75rem;
      word-break: break-word;
    }
    .actions {
      display: none;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1rem;
      -webkit-app-region: no-drag;
    }
    button {
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      border: 1px solid #3f3f46;
      background: #27272a;
      color: #fafafa;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #3f3f46; }
    button.primary {
      background: #fafafa;
      color: #0a0a0a;
      border-color: #fafafa;
    }
    button.primary:hover { background: #d4d4d8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>InkVoice</h1>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Starting...</div>
    <div class="error" id="error">
      <p id="error-message"></p>
      <div class="error-detail" id="error-detail"></div>
    </div>
    <div class="actions" id="actions">
      <button class="primary" onclick="window.inkvoice?.retry()">Retry</button>
      <button onclick="window.inkvoice?.quit()">Quit</button>
    </div>
  </div>

  <script>
    window.addEventListener('message', (event) => {
      const { type, message, detail } = event.data
      if (type === 'status') {
        document.getElementById('status').textContent = message
      } else if (type === 'error') {
        document.getElementById('spinner').style.display = 'none'
        document.getElementById('status').style.display = 'none'
        document.getElementById('error').style.display = 'block'
        document.getElementById('error-message').textContent = message
        document.getElementById('error-detail').textContent = detail || ''
        document.getElementById('actions').style.display = 'flex'
      }
    })
  </script>
</body>
</html>
